# Netlify Configuration
[build]
  command = "npm install && npm run build"
  publish = "frontend/dist"

# Omit expected frontend environment variables from secrets scanning
# These are safe client-side Firebase public keys (not secrets)
[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "VITE_API_URL,VITE_FIREBASE_API_KEY,VITE_FIREBASE_APP_ID,VITE_FIREBASE_AUTH_DOMAIN,VITE_FIREBASE_FIRESTORE_DATABASE_ID,VITE_FIREBASE_MEASUREMENT_ID,VITE_FIREBASE_MESSAGING_SENDER_ID,VITE_FIREBASE_PROJECT_ID,VITE_FIREBASE_STORAGE_BUCKET"

# Rewrite rules for SPA
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
